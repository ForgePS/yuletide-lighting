name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Create deploy .env from secrets
        env:
          FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          TINA_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_TINA_CLIENT_ID }}
          TINA_TOKEN: ${{ secrets.TINA_TOKEN }}
          PLATFORM_CREATOR_EMAILS: ${{ secrets.PLATFORM_CREATOR_EMAILS }}
        run: |
          # Empty GitHub secrets must not override known Firebase web defaults.
          FIREBASE_API_KEY="${FIREBASE_API_KEY:-AIzaSyD9jk7wARDfxpaYxigLKTJ13gK7eCBhCEY}"
          FIREBASE_AUTH_DOMAIN="${FIREBASE_AUTH_DOMAIN:-yuletide-lighting.firebaseapp.com}"
          FIREBASE_PROJECT_ID="${FIREBASE_PROJECT_ID:-yuletide-lighting}"
          FIREBASE_STORAGE_BUCKET="${FIREBASE_STORAGE_BUCKET:-yuletide-lighting.firebasestorage.app}"
          FIREBASE_MESSAGING_SENDER_ID="${FIREBASE_MESSAGING_SENDER_ID:-928287362183}"
          FIREBASE_APP_ID="${FIREBASE_APP_ID:-1:928287362183:web:e0cca4d6e2f6d89cc3bc22}"
          TINA_CLIENT_ID="${TINA_CLIENT_ID:-b17e495a-4dd4-4314-b4c8-7e816567433b}"
          cat > .env <<EOF
          NEXT_PUBLIC_FIREBASE_API_KEY=${FIREBASE_API_KEY}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${FIREBASE_AUTH_DOMAIN}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${FIREBASE_STORAGE_BUCKET}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${FIREBASE_MESSAGING_SENDER_ID}
          NEXT_PUBLIC_FIREBASE_APP_ID=${FIREBASE_APP_ID}
          NEXT_PUBLIC_TINA_CLIENT_ID=${TINA_CLIENT_ID}
          TINA_TOKEN=${TINA_TOKEN}
          PLATFORM_CREATOR_EMAILS=${PLATFORM_CREATOR_EMAILS}
          NEXT_PUBLIC_TINA_BRANCH=main
          NEXT_PUBLIC_APP_URL=https://yuletide-lighting.web.app
          EOF

      - name: Verify deploy credentials
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_YULETIDE_LIGHTING }}
          FIREBASE_SERVICE_ACCOUNT_FALLBACK: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_TOKEN" ] && [ -z "$FIREBASE_SERVICE_ACCOUNT" ] && [ -z "$FIREBASE_SERVICE_ACCOUNT_FALLBACK" ]; then
            echo "::error::No Firebase deploy credentials in GitHub secrets."
            echo ""
            echo "You do NOT need to download keys from the Firebase console."
            echo "Run this once on your computer (Owner on Firebase + Admin on this repo):"
            echo "  npx firebase-tools login"
            echo "  npx firebase-tools init hosting:github"
            echo ""
            echo "Firebase will create the GitHub secret automatically."
            echo "Or deploy locally: firebase login && npm run deploy:hosting"
            exit 1
          fi

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_SERVICE_ACCOUNT_YULETIDE_LIGHTING: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_YULETIDE_LIGHTING }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: npm run deploy:hosting

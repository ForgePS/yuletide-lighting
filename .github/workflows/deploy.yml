name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Create deploy .env from secrets
        env:
          FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          FIREBASE_ADMIN_KEY: ${{ secrets.CLCRM_FIREBASE_ADMIN_KEY }}
          TINA_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_TINA_CLIENT_ID }}
          TINA_TOKEN: ${{ secrets.TINA_TOKEN }}
        run: |
          cat > .env <<EOF
          NEXT_PUBLIC_FIREBASE_API_KEY=${FIREBASE_API_KEY}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${FIREBASE_AUTH_DOMAIN}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${FIREBASE_STORAGE_BUCKET}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${FIREBASE_MESSAGING_SENDER_ID}
          NEXT_PUBLIC_FIREBASE_APP_ID=${FIREBASE_APP_ID}
          CLCRM_FIREBASE_ADMIN_KEY=${FIREBASE_ADMIN_KEY}
          NEXT_PUBLIC_TINA_CLIENT_ID=${TINA_CLIENT_ID}
          TINA_TOKEN=${TINA_TOKEN}
          NEXT_PUBLIC_TINA_BRANCH=main
          NEXT_PUBLIC_APP_URL=https://yuletide-lighting.web.app
          EOF

      - name: Verify deploy credentials
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_ADMIN_KEY: ${{ secrets.CLCRM_FIREBASE_ADMIN_KEY }}
        run: |
          if [ -z "$FIREBASE_TOKEN" ]; then
            echo "::error::Missing GitHub secret FIREBASE_TOKEN. Generate one with: firebase login:ci"
            exit 1
          fi
          if [ -z "$FIREBASE_ADMIN_KEY" ]; then
            echo "::warning::Missing CLCRM_FIREBASE_ADMIN_KEY — CRM API routes may fail at runtime."
          fi

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: npm run deploy:hosting
